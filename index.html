<!DOCTYPE html>
<html>

<head>
<title>Smash For Hope Tournament</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#111;
color:white;
}

.upcoming{
background:#fff8e1;
}

.playing{
background:#e8f5e9;
}

.finished{
background:#eeeeee;
}

</style>
</head>

<body>

<h1>🏸 SMASH FOR HOPE TOURNAMENT</h1>

<table id="matches">

<thead>
<tr>
<th>Match</th>
<th>Category</th>
<th>Team A</th>
<th>Team B</th>
<th>Court</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXy0B0H9N-ibqRAnGRmEr30aDDwjJS05glDhDbBaFGTG6TDW-ntSqrCwI-X18ojlVAA5EWm-Inik4Z/pub?gid=2051448750&single=true&output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

const table = document.querySelector("#matches tbody");

rows.forEach(row => {

const cols = row.split(",");

let tr = document.createElement("tr");

let statusClass = cols[6].toLowerCase();

tr.className = statusClass;

tr.innerHTML = `
<td>${cols[0]}</td>
<td>${cols[1]}</td>
<td>${cols[2]}</td>
<td>${cols[3]}</td>
<td>${cols[4]}</td>
<td>${cols[5]}</td>
<td>${cols[6]}</td>
`;

table.appendChild(tr);

});

});

setTimeout(()=>location.reload(),10000);

</script>

</body>

</html>
